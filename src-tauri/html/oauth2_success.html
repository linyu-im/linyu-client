<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权成功</title>
    <style>
        :root {
            --primary: #4C9BFF;
            --bg: #05070a;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .content {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .check-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 40px;
        }

        .ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid rgba(76, 155, 255, 0.2);
            border-radius: 50%;
            animation: pulse 2.5s infinite ease-in-out;
        }

        .ring-inner {
            position: absolute;
            top: 10px;
            left: 10px;
            width: calc(100% - 24px);
            height: calc(100% - 24px);
            border: 2px solid var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 0.5em;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 20px rgba(76, 155, 255, 0.5);
        }

        p {
            font-size: 13px;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 20px;
            text-transform: uppercase;
        }

        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(76, 155, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.3);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 0;
            }
        }

        .loader {
            width: 40px;
            height: 1px;
            background: rgba(76, 155, 255, 0.2);
            margin: 30px auto 0;
            position: relative;
            overflow: hidden;
        }

        .loader::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--primary);
            animation: loading 5s forwards;
        }

        @keyframes loading {
            to {
                left: 0;
            }
        }
    </style>
</head>

<body>
    <div class="ambient-glow"></div>

    <div class="content">
        <div class="check-wrapper">
            <div class="ring"></div>
            <div class="ring-inner">
                <svg viewBox="0 0 100 100"
                    style="width: 40px; fill: none; stroke: white; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round;">
                    <path d="M30 50L45 65L70 35"></path>
                </svg>
            </div>
        </div>

        <h1>登录成功</h1>
        <p>您可以关闭此窗口返回应用</p>

        <div class="loader"></div>
    </div>
</body>

</html>
